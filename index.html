<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growtopia Premium Gacha</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #050a18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- BACKGROUND ANIMASI (POIN 5) --- */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: url('https://images8.alphacoders.com/109/1093153.png') center/cover;
            filter: brightness(0.4);
        }
        .overlay-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--bg-dark) 90%);
            z-index: -1;
        }

        /* --- CLOCK BAR (POIN 4 & 7) --- */
        .top-bar {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0; z-index: 100;
        }
        .clocks { display: flex; gap: 20px; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; }
        .clocks span { color: var(--primary); }

        /* --- LOGIN PANEL --- */
        .container { display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }
        h1 { font-family: 'Orbitron', sans-serif; margin-bottom: 20px; font-size: 1.5rem; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255,255,255,0.1); border: 1px solid var(--primary);
            color: #fff; border-radius: 8px; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; margin-top: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none; color: #fff; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary); }

        /* --- GACHA SELECTION (MIRIP GAMBAR) --- */
        .main-content { display: none; padding: 20px; }
        .section-title { text-align: center; margin: 30px 0; font-family: 'Orbitron'; color: var(--primary); }
        
        .chest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px; margin: 0 auto;
        }
        .chest-card {
            background: var(--card-bg);
            border-radius: 15px; padding: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; cursor: pointer;
        }
        .chest-card:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--primary); }
        .chest-card img { width: 120px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--primary)); }
        
        /* --- GACHA ROLLER (POIN 3) --- */
        #gacha-screen { display: none; text-align: center; padding-top: 50px; }
        .roller-container {
            width: 100%; max-width: 800px; margin: 40px auto;
            position: relative; overflow: hidden;
            background: rgba(0,0,0,0.5); border: 2px solid var(--primary);
            height: 150px; border-radius: 10px;
        }
        .roller-line {
            position: absolute; top: 0; left: 50%; width: 4px; height: 100%;
            background: red; z-index: 10; box-shadow: 0 0 10px red;
        }
        .roller-items {
            display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .roll-item {
            width: 120px; height: 150px; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .roll-item img { width: 60px; height: 60px; }

        /* --- ADMIN PANEL (POIN 6) --- */
        .admin-panel {
            background: rgba(20, 0, 0, 0.8); padding: 20px; border-radius: 15px;
            border: 1px solid red; margin-top: 40px; max-width: 500px; margin: 40px auto;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="video-bg"></div>
    <div class="overlay-gradient"></div>

    <div id="player" style="position:absolute; top:-999px;"></div>

    <div class="top-bar">
        <div id="hari-ini">Senin, 01 Januari 2024</div>
        <div class="clocks">
            <div>WIB: <span id="wib">00:00:00</span></div>
            <div>WITA: <span id="wita">00:00:00</span></div>
            <div>WIT: <span id="wit">00:00:00</span></div>
        </div>
    </div>

    <div id="login-screen" class="container">
        <div class="glass-card">
            <h1>LOGIN PANEL</h1>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="login()">ENTER PANEL</button>
            <p id="error" style="color: red; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="dashboard" class="main-content">
        <button onclick="logout()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        
        <h2 class="section-title">PILIH CHEST UNTUK DIBUKA</h2>
        
        <div class="chest-grid">
            <div class="chest-card" onclick="startGacha('Rare')">
                <img src="https://vdownload.im/g/growtopia/items/rare_chest.png" alt="Chest">
                <h3>Rare Chest</h3>
                <p style="font-size:0.8rem; color:var(--primary)">1x Buka</p>
            </div>
            <div class="chest-card" onclick="startGacha('Mythic')">
                <img src="https://vdownload.im/g/growtopia/items/mythic_chest.png" alt="Chest">
                <h3 style="color: #ff00ff;">Mythic Chest</h3>
                <p style="font-size:0.8rem; color:#ff00ff">1x Buka</p>
            </div>
            <div class="chest-card" onclick="startGacha('Secret')">
                <img src="https://vdownload.im/g/growtopia/items/secret_chest.png" alt="Chest">
                <h3 style="color: #ffae00;">Secret Chest</h3>
                <p style="font-size:0.8rem; color:#ffae00">1x Buka</p>
            </div>
        </div>

        <div id="admin-only" class="admin-panel hidden">
            <h3 style="color:red">ADMIN CONTROL</h3>
            <input type="text" id="new-user" placeholder="Buat User Baru">
            <input type="password" id="new-pass" placeholder="Password User">
            <button class="btn" style="background:red" onclick="createUser()">BUAT AKUN</button>
            <div id="user-list" style="margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <div id="gacha-screen">
        <h2 id="chest-name-rolling">ROLLING...</h2>
        <div class="roller-container">
            <div class="roller-line"></div>
            <div class="roller-items" id="roller-box"></div>
        </div>
        <div id="gacha-result-text" style="font-size: 1.5rem; font-weight: bold; margin-top: 20px;"></div>
        <button class="btn" style="width: 200px" onclick="backToDashboard()">KEMBALI</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // DATA ITEM (POIN 3)
        const ITEMS = [
            { nama: "World Lock", img: "https://images.vdownload.im/g/growtopia/items/world_lock.png", chance: 60 },
            { nama: "Diamond Lock", img: "https://images.vdownload.im/g/growtopia/items/diamond_lock.png", chance: 30 },
            { nama: "Blue Anemone Hair", img: "https://images.vdownload.im/g/growtopia/items/blue_anemone_hair.png", chance: 8 },
            { nama: "Devil Wings", img: "https://images.vdownload.im/g/growtopia/items/devil_wings.png", chance: 2 }
        ];

        // SETUP DATABASE LOKAL
        if(!localStorage.getItem('gt_users')) {
            localStorage.setItem('gt_users', JSON.stringify({ "admin": {pass: "admin123", role: "admin"} }));
        }

        let users = JSON.parse(localStorage.getItem('gt_users'));
        let ytPlayer;

        // MUSIK (POIN 2)
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0', videoId: 'gQ59f_68sv4',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'gQ59f_68sv4' }
            });
        }
        window.onclick = () => { if(ytPlayer) ytPlayer.playVideo(); };

        // JAM (POIN 7)
        function clock() {
            const now = new Date();
            const opt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
            document.getElementById('hari-ini').innerText = now.toLocaleDateString('id-ID', opt);
            
            document.getElementById('wib').innerText = now.toLocaleTimeString('id-ID', {timeZone: 'Asia/Jakarta'});
            document.getElementById('wita').innerText = now.toLocaleTimeString('id-ID', {timeZone: 'Asia/Makassar'});
            document.getElementById('wit').innerText = now.toLocaleTimeString('id-ID', {timeZone: 'Asia/Jayapura'});
        }
        setInterval(clock, 1000);

        // LOGIN (POIN 1)
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(users[u] && users[u].pass === p) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                if(users[u].role === 'admin') {
                    document.getElementById('admin-only').classList.remove('hidden');
                    renderUserList();
                }
            } else {
                document.getElementById('error').innerText = "Akses Ditolak! Akun Tidak Terdaftar.";
            }
        }

        // GACHA LOGIC (MIRIP TERA PS / NUSA TOPIC)
        function startGacha(type) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('gacha-screen').style.display = 'block';
            document.getElementById('chest-name-rolling').innerText = "OPENING " + type.toUpperCase() + " CHEST...";
            
            const roller = document.getElementById('roller-box');
            roller.innerHTML = '';
            roller.style.transition = 'none';
            roller.style.transform = 'translateX(0px)';

            // Build 50 random items for animation
            let itemsToRoll = [];
            for(let i=0; i<60; i++) {
                itemsToRoll.push(ITEMS[Math.floor(Math.random() * ITEMS.length)]);
            }

            // Pick winner based on chance
            let winRand = Math.random() * 100;
            let current = 0;
            let winner = ITEMS[0];
            for(let it of ITEMS) {
                current += it.chance;
                if(winRand <= current) { winner = it; break; }
            }
            itemsToRoll[55] = winner; // The 56th item is our winner

            itemsToRoll.forEach(it => {
                roller.innerHTML += `<div class="roll-item"><img src="${it.img}"><p style="font-size:0.6rem">${it.nama}</p></div>`;
            });

            setTimeout(() => {
                roller.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                // Calculation: (item width 120 * index 55) - offset container to center
                const xMove = (55 * 120) - (document.querySelector('.roller-container').offsetWidth / 2) + 60;
                roller.style.transform = `translateX(-${xMove}px)`;
            }, 100);

            setTimeout(() => {
                document.getElementById('gacha-result-text').innerText = "YOU GOT: " + winner.nama.toUpperCase();
                document.getElementById('gacha-result-text').style.color = "var(--primary)";
            }, 5200);
        }

        function backToDashboard() {
            document.getElementById('gacha-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('gacha-result-text').innerText = "";
        }

        // ADMIN CREATE (POIN 6)
        function createUser() {
            const nu = document.getElementById('new-user').value;
            const np = document.getElementById('new-pass').value;
            if(nu && np) {
                users[nu] = {pass: np, role: 'member'};
                localStorage.setItem('gt_users', JSON.stringify(users));
                alert("Akun Member Berhasil Dibuat!");
                renderUserList();
            }
        }

        function renderUserList() {
            let html = "<strong>User Terdaftar:</strong><br>";
            for(let u in users) html += `- ${u} (${users[u].role})<br>`;
            document.getElementById('user-list').innerHTML = html;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
