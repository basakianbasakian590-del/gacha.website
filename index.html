<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndraDev - Growtopia Gacha</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #0a0a2e;
        }

        /* Background Animasi Growtopia */
        .growtopia-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .growtopia-bg canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { transform: translateY(-100vh) rotate(720deg); opacity: 1; }
        }

        /* Pixel Blocks (Growtopia Style) */
        .pixel-block {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #2d5a1e;
            border: 2px solid #1a3a0f;
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Login Container */
        .login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 46, 0.95);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.1);
        }

        .login-container h1 {
            text-align: center;
            color: #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #8b6914;
        }

        .login-container .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-container .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-container .logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ffd700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ddd;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .blocked-msg {
            color: #ff6600;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .attempts-info {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }

        .register-link a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Music Controls */
        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 100;
        }

        .music-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .music-btn:hover {
            background: rgba(255, 215, 0, 0.4);
            transform: scale(1.1);
        }

        .speed-control {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 10px;
            gap: 5px;
        }

        .speed-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 5px;
            padding: 5px 10px;
            color: #ffd700;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .speed-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        /* Jam Digital */
        .clock-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px 20px;
            color: #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .clock-display .date {
            font-size: 10px;
            color: #aaa;
            font-family: 'Poppins', sans-serif;
        }

        .clock-display .timezone {
            font-size: 8px;
            color: #888;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 20px;
            }
            .login-container h1 {
                font-size: 18px;
            }
            .clock-display {
                font-size: 10px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animasi Growtopia -->
    <div class="growtopia-bg">
        <canvas id="growtopiaCanvas"></canvas>
        <div class="particles" id="particles"></div>
        <!-- Pixel Blocks akan digenerate oleh JS -->
        <div id="pixelBlocks"></div>
    </div>

    <!-- Jam Digital -->
    <div class="clock-display" id="clockDisplay">
        <div id="timeDisplay">00:00:00</div>
        <div class="date" id="dateDisplay">Senin, 1 Januari 2026</div>
        <div class="timezone" id="timezoneDisplay">WIB</div>
    </div>

    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="logo">
            <span style="font-size: 60px;">🎮</span>
        </div>
        <h1>AndraDev</h1>
        <div class="subtitle">Growtopia Gacha System</div>
        
        <div id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username..." autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password..." autocomplete="off">
            </div>
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">🔑 MASUK</button>
            <div class="error-msg" id="errorMsg">❌ Username atau password salah!</div>
            <div class="blocked-msg" id="blockedMsg">🚫 Akun Anda telah diblokir! Hubungi Admin.</div>
            <div class="attempts-info" id="attemptsInfo">Percobaan tersisa: 3</div>
        </div>

        <div class="register-link">
            Belum punya akun? <a href="#" onclick="showRegister()">Daftar Sekarang</a>
        </div>
    </div>

    <!-- Register Container (Hidden) -->
    <div class="login-container" id="registerContainer" style="display: none;">
        <div class="logo">
            <span style="font-size: 60px;">📝</span>
        </div>
        <h1>Daftar Akun</h1>
        <div class="subtitle">Buat akun baru untuk bermain</div>
        
        <div id="registerForm">
            <div class="form-group">
                <label>Username Baru</label>
                <input type="text" id="regUsername" placeholder="Buat username..." autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="regPassword" placeholder="Buat password..." autocomplete="off">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Konfirmasi password..." autocomplete="off">
            </div>
            <button class="login-btn" onclick="handleRegister()">✅ DAFTAR</button>
            <div class="error-msg" id="regErrorMsg"></div>
        </div>

        <div class="register-link">
            Sudah punya akun? <a href="#" onclick="showLogin()">Masuk</a>
        </div>
    </div>

    <!-- Music Controls -->
    <div class="music-controls">
        <div class="speed-control" id="speedControl">
            <button class="speed-btn" onclick="setSpeed(1)">1x</button>
            <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
            <button class="speed-btn" onclick="setSpeed(2)">2x</button>
            <button class="speed-btn" onclick="setSpeed(3)">3x</button>
        </div>
        <button class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</button>
        <button class="music-btn" onclick="toggleSpeedControl()">⏩</button>
    </div>

    <script>
        // ==================== DATABASE SIMULASI ====================
        let database = {
            users: JSON.parse(localStorage.getItem('andradev_users')) || {
                admin: {
                    password: 'admin123',
                    role: 'admin',
                    blocked: false,
                    loginAttempts: 0,
                    expired: null,
                    balance: 999999999,
                    createdBy: 'system'
                },
                member1: {
                    password: 'member123',
                    role: 'member',
                    blocked: false,
                    loginAttempts: 0,
                    expired: '2027-01-01',
                    balance: 500000,
                    createdBy: 'admin'
                }
            },
            items: JSON.parse(localStorage.getItem('andradev_items')) || {
                basic: [
                    { name: 'Shadow Shard', image: '🔮', chance: 40, id: 1 },
                    { name: 'Crystal Fragment', image: '💎', chance: 30, id: 2 },
                    { name: 'Magic Dust', image: '✨', chance: 20, id: 3 },
                    { name: 'Common Seed', image: '🌱', chance: 10, id: 4 }
                ],
                rare: [
                    { name: 'Legendary Sword', image: '🗡️', chance: 20, id: 5 },
                    { name: 'Dragon Scale', image: '🐉', chance: 25, id: 6 },
                    { name: 'Mythical Orb', image: '🔵', chance: 30, id: 7 },
                    { name: 'Phoenix Feather', image: '🪶', chance: 25, id: 8 }
                ],
                mythic: [
                    { name: 'AndraDev Crown', image: '👑', chance: 5, id: 9 },
                    { name: 'Cosmic Wings', image: '🪽', chance: 10, id: 10 },
                    { name: 'Time Gem', image: '⏳', chance: 15, id: 11 },
                    { name: 'Infinity Blade', image: '⚔️', chance: 20, id: 12 },
                    { name: 'Golden Apple', image: '🍎', chance: 25, id: 13 },
                    { name: 'Star Fragment', image: '⭐', chance: 25, id: 14 }
                ]
            },
            gachaHistory: JSON.parse(localStorage.getItem('andradev_history')) || [],
            settings: JSON.parse(localStorage.getItem('andradev_settings')) || {
                webName: 'AndraDev',
                musicUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                musicVolume: 0.5
            },
            transfers: JSON.parse(localStorage.getItem('andradev_transfers')) || []
        };

        // ==================== SAVE DATABASE ====================
        function saveDatabase() {
            localStorage.setItem('andradev_users', JSON.stringify(database.users));
            localStorage.setItem('andradev_items', JSON.stringify(database.items));
            localStorage.setItem('andradev_history', JSON.stringify(database.gachaHistory));
            localStorage.setItem('andradev_settings', JSON.stringify(database.settings));
            localStorage.setItem('andradev_transfers', JSON.stringify(database.transfers));
        }

        // ==================== BACKGROUND ANIMASI ====================
        function initGrowtopiaBackground() {
            const canvas = document.getElementById('growtopiaCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2e');
            gradient.addColorStop(0.3, '#1a1a4e');
            gradient.addColorStop(0.6, '#2a1a3e');
            gradient.addColorStop(1, '#1a2a1e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 3 + 1;
                const alpha = Math.random() * 0.8 + 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
