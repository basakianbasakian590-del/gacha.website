<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndraWeb Gacha</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
}

body {
    background: #0a0d27 url('https://i.imgur.com/7ZbXqYj.jpg') no-repeat center/cover fixed;
    color: #ffffff;
    min-height: 100vh;
    padding: 20px 15px;
    line-height: 1.5;
    transition: background 0.3s;
}

/* Kontrol Musik */
.music-control {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(12, 18, 50, 0.9);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(114, 215, 255, 0.4);
    z-index: 9999;
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 13px;
}

.music-control button {
    background: #0099ff;
    border: none;
    border-radius: 4px;
    color: white;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
}

.music-control button:hover {
    background: #00b2ff;
}

/* Animasi Gaya Growtopia */
@keyframes kilau {
    0% { box-shadow: 0 0 10px #ffd700, 0 0 20px rgba(255,215,0,0.4), inset 0 0 5px rgba(255,215,0,0.3); }
    50% { box-shadow: 0 0 20px #fff350, 0 0 35px rgba(255,215,0,0.7), inset 0 0 10px rgba(255,215,0,0.6); }
    100% { box-shadow: 0 0 10px #ffd700, 0 0 20px rgba(255,215,0,0.4), inset 0 0 5px rgba(255,215,0,0.3); }
}

@keyframes gerakBingkai {
    0% { border-color: #ffd700 #4ecdc4 #ffd700 #4ecdc4; }
    25% { border-color: #4ecdc4 #ffd700 #4ecdc4 #ffd700; }
    50% { border-color: #ff6b6b #ffd700 #ff6b6b #ffd700; }
    75% { border-color: #4ecdc4 #ff6b6b #4ecdc4 #ff6b6b; }
    100% { border-color: #ffd700 #4ecdc4 #ffd700 #4ecdc4; }
}

@keyframes naikTurun {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}

/* Halaman Login */
#halamanLogin {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
}

.login-box {
    background: linear-gradient(135deg, #1a2a4a 0%, #0f1a36 100%);
    padding: 35px 30px;
    border-radius: 12px;
    border: 3px solid #ffd700;
    width: 100%;
    max-width: 400px;
    animation: kilau 3s infinite ease-in-out, gerakBingkai 8s linear infinite, naikTurun 4s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

.login-box::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 60%);
    animation: kilau 6s infinite alternate;
    pointer-events: none;
}

.login-box h2 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(255,215,0,0.5), 2px 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 1px;
}

.login-box p {
    text-align: center;
    color: #c0d8ff;
    margin-bottom: 20px;
    font-size: 14px;
    text-shadow: 1px 1px 2px #000;
}

.login-box input {
    width: 100%;
    padding: 13px;
    margin: 10px 0;
    border-radius: 6px;
    border: 2px solid #3a5795;
    background: #162342;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: 0.2s;
}

.login-box input:focus {
    border-color: #ffd700;
    box-shadow: 0 0 8px rgba(255,215,0,0.6);
}

.btn-login {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(180deg, #ffd700 0%, #f5b800 100%);
    color: #111;
    cursor: pointer;
    margin-top: 15px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.3);
    transition: 0.2s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(255,215,0,0.4);
}

.pesan-error {
    color: #ff6666;
    text-align: center;
    margin-top: 12px;
    display: none;
    font-weight: bold;
}

/* Halaman Utama */
#halamanUtama {
    display: none;
}

header {
    text-align: center;
    margin-bottom: 35px;
    padding: 15px;
    background: rgba(12, 18, 50, 0.75);
    border-radius: 12px;
    border: 2px solid rgba(255, 215, 0, 0.4);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    animation: kilau 4s infinite ease-in-out;
}

h1 {
    font-size: 28px;
    background: linear-gradient(90deg, #ffd700, #b066ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
}

.info-user {
    font-size: 14px;
    color: #c0d8ff;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.jam-wib {
    font-weight: bold;
    color: #ffd700;
}

.btn-keluar {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #ff4466;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-keluar:hover {
    background: #ff2244;
    box-shadow: 0 0 10px rgba(255,68,102,0.5);
}

.subtitle {
    color: #c0d8ff;
    font-size: 14px;
    margin-top: 8px;
    text-align: center;
}

.chest-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
    max-width: 950px;
    margin: 0 auto 45px;
}

.chest-card {
    background: rgba(16, 24, 60, 0.88);
    border-radius: 18px;
    padding: 28px 18px;
    text-align: center;
    border: 2px solid rgba(255, 215, 0, 0.4);
    box-shadow: 0 0 28px rgba(255, 215, 0, 0.22);
    transition: all 0.28s ease;
    cursor: pointer;
    animation: naikTurun 5s ease-in-out infinite;
}

.chest-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 38px rgba(255, 215, 0, 0.6);
    border-color: #ffd700;
}

.chest-card img {
    width: 130px;
    height: 130px;
    margin-bottom: 16px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
}

.chest-card h3 {
    font-size: 21px;
    margin-bottom: 10px;
    color: #ffd700;
    text-shadow: 0 0 6px rgba(255,215,0,0.5);
}

.chest-desc {
    font-size: 13px;
    color: #c0d8ff;
    margin-bottom: 20px;
}

.btn-buka {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 11px;
    font-size: 17px;
    font-weight: bold;
    background: linear-gradient(90deg, #ffd700, #f59e00);
    color: #111;
    cursor: pointer;
    transition: 0.22s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

.btn-buka:hover {
    background: linear-gradient(90deg, #fff350, #ffb300);
    box-shadow: 0 0 18px rgba(255, 215, 0, 0.7);
    transform: translateY(-2px);
}

.result-area {
    max-width: 720px;
    margin: 0 auto 40px;
    background: rgba(16, 24, 60, 0.92);
    border-radius: 18px;
    padding: 32px 22px;
    border: 2px solid rgba(255, 215, 0, 0.4);
    text-align: center;
    min-height: 230px;
    box-shadow: 0 0 25px rgba(255,215,0,0.2);
}

.result-area h2 {
    color: #ffd700;
    margin-bottom: 28px;
    font-size: 24px;
    text-shadow: 0 0 8px rgba(255,215,0,0.5);
}

#hasil {
    font-size: 24px;
    font-weight: bold;
    color: #ffdd44;
}

#hasil img {
    width: 150px;
    margin-top: 22px;
    border-radius: 12px;
    box-shadow: 0 0 22px rgba(255, 220, 68, 0.6);
    filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
}

.item-list {
    max-width: 950px;
    margin: 0 auto 40px;
    background: rgba(12, 20, 55, 0.85);
    border-radius: 16px;
    padding: 22px;
    border: 2px solid rgba(255, 215, 0, 0.3);
    box-shadow: 0 0 20px rgba(255,215,0,0.15);
}

.item-list h3 {
    color: #ffd700;
    margin-bottom: 18px;
    font-size: 20px;
    text-shadow: 0 0 6px rgba(255,215,0,0.4);
}

.items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 15px;
}

.item-box {
    background: rgba(25, 35, 75, 0.8);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid rgba(255, 215, 0, 0.3);
    transition: 0.2s;
}

.item-box:hover {
    border-color: #ffd700;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.item-box img {
    width: 50px;
    margin-bottom: 8px;
    object-fit: contain;
}

.item-box p {
    font-size: 12px;
    color: #d0e6ff;
}

/* Panel Admin */
#adminPanel {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.93);
    z-index: 999;
    padding: 25px 15px;
    overflow-y: auto;
}

.admin-box {
    max-width: 500px;
    margin: 20px auto;
    background: linear-gradient(135deg, #1a2a4a 0%, #0f1a36 100%);
    padding: 28px 22px;
    border-radius: 18px;
    border: 3px solid #ffd700;
    animation: kilau 3s infinite ease-in-out;
}

.admin-box h3 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 22px;
    font-size: 22px;
    text-shadow: 0 0 8px rgba(255,215,0,0.5);
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 9px 0 16px;
    border-radius: 9px;
    border: 2px solid #3a5795;
    background: #1e2952;
    color: #ffffff;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
    border-color: #ffd700;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
}

textarea {
    min-height: 120px;
    resize: vertical;
}

.btn-admin {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 9px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(90deg, #ffd700, #b066ff);
    color: #111;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}

.btn-admin:hover {
    opacity: 0.9;
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
}

.btn-tutup {
    background: #ff4466;
    margin-top: 20px;
    color: white;
}

.btn-hapus {
    background: #ff4466;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
}

.daftar-akun {
    background: rgba(16, 24, 60, 0.8);
    border-radius: 8px;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid rgba(255,215,0,0.3);
}

.daftar-akun p {
    margin: 4px 0;
    font-size: 14px;
    color: #d0e6ff;
}

.form-item {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
}

.btn-pengaturan {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 16px;
    border-radius: 8px;
    background: #222e66;
    border: 2px solid #ffd700;
    color: #ffd700;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
    transition: 0.2s;
}

.btn-pengaturan:hover {
    background: #2a3980;
    box-shadow: 0 0 15px rgba(255,215,0,0.6);
}
</style>
</head>
<body>

<!-- Kontrol Musik -->
<div class="music-control">
    <button id="toggleMusic">🔊 Putar/Jeda</button>
    <input type="range" id="volumeControl" min="0" max="100" value="50" style="width:70px;">
</div>
<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.jsdelivr.net/gh/andrawb/assets/music/dj-plat-kt-breakbeat-2026.mp3" type="audio/mpeg">
    Browser kamu tidak mendukung pemutar musik.


<!-- Halaman Login -->
<div id="halamanLogin">
    <div class="login-box">
        <h2>AndraWeb Gacha</h2>
        <p>Gunakan akun yang diberikan pengelola</p>
        <input type="text" id="inputUser" placeholder="Username">
        <input type="password" id="inputPass" placeholder="Password">
        <button class="btn-login" onclick="cekLogin()">Masuk</button>
        <div class="pesan-error" id="pesanError">Username atau Password salah / sudah kadaluwarsa!</div>
    </div>
</div>

<!-- Halaman Utama -->
<div id="halamanUtama">
    <header>
        <h1>AndraWeb Gacha</h1>
        <div class="info-user">
            <span>Selamat datang, <span id="namaPengguna"></span></span>
            <span class="jam-wib" id="jamWib"></span>
        </div>
        <button class="btn-keluar" onclick="keluarAkun()">Keluar</button>
    </header>
    <p class="subtitle">PILIH CHEST UNTUK DIBUKA • Setiap chest berisi item dengan peluang berbeda</p>

    <div class="chest-selector">
        <div class="chest-card" onclick="pilihChest('rare')">
            <img src="https://i.imgur.com/7Z9KqGm.png" alt="Rare Chest">
            <h3>Rare Chest</h3>
            <p class="chest-desc">Kotak hadiah dengan item kualitas biasa sampai bagus</p>
            <button class="btn-buka" onclick="mulaiGacha()">BUKA SEKARANG</button>
        </div>
        <div class="chest-card" onclick="pilihChest('mythic')">
            <img src="https://i.imgur.com/3xQz8Lp.png" alt="Mythic Chest">
            <h3>Mythic Chest</h3>
            <p class="chest-desc">Kotak hadiah dengan peluang item langka lebih tinggi</p>
            <button class="btn-buka" onclick="mulaiGacha()">BUKA SEKARANG</button>
        </div>
        <div class="chest-card" onclick="pilihChest('secret')">
            <img src="https://i.imgur.com/9V5mQxH.png" alt="Secret Chest">
            <h3>Secret Chest</h3>
            <p class="chest-desc">Kotak hadiah khusus, berisi item paling langka</p>
            <button class="btn-buka" onclick="mulaiGacha()">BUKA SEKARANG</button>
        </div>
    </div>

    <div class="result-area">
        <h2>Hasil Buka Chest</h2>
        <div id="hasil">Silakan pilih dan buka salah satu peti di atas</div>
    </div>

    <div class="item-list">
        <h3>Daftar Item di Dalam Chest</h3>
        <div class="items-grid" id="daftarItemTampil"></div>
    </div>

    <button class="btn-pengaturan" onclick="bukaAdmin()">⚙️ Pengaturan Admin</button>
</div>

<!-- Panel Admin -->
<div id="adminPanel">
    <div class="admin-box">
        <h3>🔐 Masuk Pengaturan</h3>
        <input type="password" id="passAdmin" placeholder="Masukkan sandi admin">
        <button class="btn-admin" onclick="cekSandiAdmin()">Masuk</button>

        <div id="kontenAdmin" style="display:none; margin-top:25px;">
            <!-- Atur Akun Pengguna -->
            <h3>👤 Atur Akun Pengguna</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:8px; margin-bottom:15px;">
                <input type="text" id="tambahUser" placeholder="Username">
                <input type="password" id="tambahPass" placeholder="Password">
                <select id="masaAktif">
                    <option value="0">Selamanya</option>
                    <option value="1">1 Hari</option>
                    <option value="7">7 Hari</option>
                    <option value="30">30 Hari</option>
                </select>
                <button class="btn-admin" onclick="tambahAkun()" style="padding:12px 8px;">+</button>
            </div>
            <div id="tampilanDaftarAkun"></div>

            <!-- Ganti Lagu -->
            <h3 style="margin-top:22px;">🎵 Ganti Lagu Latar</h3>
            <input type="text" id="linkLagu" placeholder="Masukkan link lagu MP3">
            <button class="btn-admin" onclick="gantiLagu()">Terapkan</button>

            <!-- Ganti Latar -->
            <h3 style="margin-top:22px;">🖼️ Ganti Latar Belakang</h3>
            <input type="text" id="linkLatar" placeholder="Tautan gambar latar">
            <button class="btn-admin" onclick="gantiLatar()">Terapkan</button>

            <!-- Atur Item & Peluang -->
            <h3 style="margin-top:22px;">📋 Atur Item & Peluang</h3>
            <select id="jenisPeti">
                <option value="rare">Rare Chest</option>
                <option value="mythic">Mythic Chest</option>
                <option value="secret">Secret Chest</option>
            </select>
            <div class="form-item">
                <input type="text" id="namaItem" placeholder="Nama Item">
                <input type="text" id="gambarItem" placeholder="Link Gambar">
                <input type="number" id="peluangItem" min="0" max="100" step="0.1" placeholder="Peluang %">
                <button class="btn-admin" onclick="tambahItem()">+</button>
            </div>
            <div id="daftarItemAdmin"></div>

            <button class="btn-admin btn-tutup" onclick="tutupAdmin()">Tutup Pengaturan</button>
        </div>
    </div>
</div>

<script>
// Data Awal
let daftarAkun = JSON.parse(localStorage.getItem('daftarAkunGacha')) || [
    { username: "admin", sandi: "admin123", kadaluarsa: 0 }
];

let chestData = JSON.parse(localStorage.getItem('chestDataGacha')) || {
    rare: [
        { nama: "✨ Legendary Rayman", gambar: "https://i.imgur.com/Z6XbK0F.png", peluang: 5 },
        { nama: "💎 Mythical Rayman", gambar: "https://i.imgur.com/8Km9tLL.png", peluang: 15 },
        { nama: "🔧 Magplant 15K", gambar: "https://i.imgur.com/2nCt3Sbl.png", peluang: 25 },
        { nama: "🪱 Worm", gambar: "https://i.imgur.com/3yaf2WB.png", peluang: 55 }
    ],
    mythic: [
        { nama: "✨ Legendary Rayman", gambar: "https://i.imgur.com/Z6XbK0F.png", peluang: 12 },
        { nama: "💎 Mythical Rayman", gambar: "https://i.imgur.com/8Km9tLL.png", peluang: 28 },
        { nama: "🔧 Magplant 15K", gambar: "https://i.imgur.com/2nCt3Sbl.png", peluang: 35 },
        { nama: "🪱 Worm", gambar: "https://i.imgur.com/3yaf2WB.png", peluang: 25 }
    ],
    secret: [
        { nama: "✨ Legendary Rayman", gambar: "https://i.imgur.com/Z6XbK0F.png", peluang: 25 },
        { nama: "💎 Mythical Rayman", gambar: "https://i.imgur.com/8Km9tLL.png", peluang: 40 },
        { nama: "🔧 Magplant 15K", gambar: "https://i.imgur.com/2nCt3Sbl.png", peluang: 25 },
        { nama: "🪱 Worm", gambar: "https://i.imgur.com/3yaf2WB.png", peluang: 10 }
    ]
};

let jenisSekarang = "rare";
const sandiAdmin = "admin123";
const musik = document.getElementById("bgMusic");

// Jam WIB
function perbaruiJam() {
    const waktu = new Date().toLocaleString('id-ID', {
        timeZone: 'Asia/Jakarta',
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });
    document.getElementById("jamWib").textContent = waktu;
}
setInterval(perbaruiJam, 1000);
perbaruiJam();

// Kontrol Musik
document.getElementById("toggleMusic").addEventListener("click", () => {
    if (musik.paused) musik.play().catch(e => console.log("Klik untuk aktifkan musik:", e));
    else musik.pause();
});
document.getElementById("volumeControl").addEventListener("input", () => musik.volume = document.getElementById("volumeControl").value / 100);

// Fungsi Login
function cekLogin() {
    const user = document.getElementById("inputUser").value.trim();
    const pass = document.getElementById("inputPass").value.trim();
    const sekarang = Date.now();
    const cocok = daftarAkun.find(a => a.username === user && a.sandi === pass);

    if (!cocok) return tampilPesanSalah();
    if (cocok.kadaluarsa !== 0 && cocok.kadaluarsa < sekarang) return tampilPesanSalah();

    document.getElementById("namaPengguna").textContent = user;
    document.getElementById("halamanLogin").style.display = "none";
    document.getElementById("halamanUtama").style.display = "block";
    tampilkanDaftarItem();
}

function tampilPesanSalah() {
    const el = document.getElementById("pesanError");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
}

function keluarAkun() {
    document.getElementById("halamanUtama").style.display = "none";
    document.getElementById("halamanLogin").style.display = "flex";
    document.getElementById("inputUser").value = "";
    document.getElementById("inputPass").value = "";
}

// Fungsi Gacha
function tampilkanDaftarItem() {
    const wadah = document.getElementById("daftarItemTampil");
    wadah.innerHTML = "";
    chestData[jenisSekarang].forEach(item => {
        wadah.innerHTML += `
            <div class="item-box">
                <img src="${item.gambar}" alt="${item.nama}" onerror="this.src='https://i.imgur.com/9ZbXqYj.jpg'">
                <p>${item.nama}</p>
                <p style="font-size:10px; color:#aaa;">${item.peluang}%</p>
            </div>
        `;
    });
}

function pilihChest(jenis) {
    jenisSekarang = jenis;
    document.getElementById("hasil").innerHTML = `Kamu memilih <b style="color:#ffd700;">${jenis.toUpperCase()} CHEST</b>, silakan tekan tombol buka!`;
    tampilkanDaftarItem();
}

function mulaiGacha() {
    const daftar = chestData[jenisSekarang];
    const acak = Math.random() * 100;
    let total = 0, dapat;
    for (let barang of daftar) {
        total += barang.peluang;
        if (acak <= total) { dapat = barang; break; }
    }
    document.getElementById("hasil").innerHTML = `
        <h3>${dapat.nama}</h3>
        <img src="${dapat.gambar}" alt="Hadiah" onerror="this.src='https://i.imgur.com/9ZbXqYj.jpg'">
        <p style="margin-top:10px; color:#aaa;">Peluang: ${dapat.peluang}%</p>
    `;
}

// Panel Admin
function bukaAdmin() {
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("kontenAdmin").style.display = "none";
    document.getElementById("passAdmin").value = "";
}

function tutupAdmin() {
    document.getElementById("adminPanel").style.display = "none";
}

function cekSandiAdmin() {
    const masukan = document.getElementById("passAdmin").value;
    if (masukan === sandiAdmin) {
        document.getElementById("kontenAdmin").style.display = "block";
        tampilkanDaftarAkun();
        tampilkanDaftarItemAdmin();
    } else alert("❌ Sandi admin salah!");
}

function simpanData() {
    localStorage.setItem('daftarAkunGacha', JSON.stringify(daftarAkun));
    localStorage.setItem('chestDataGacha', JSON.stringify(chestData));
}

function tambahAkun() {
    const user = document.getElementById("tambahUser").value.trim();
    const pass = document.getElementById("tambahPass").value.trim();
    const hari = parseInt(document.getElementById("masaAktif").value);
    if (!user || !pass) return alert("⚠️ Isi username & password!");
    const kadaluarsa = hari === 0 ? 0 : Date.now() + hari * 86400000;
    daftarAkun.push({ username: user, sandi: pass, kadaluarsa });
    simpanData();
    tampilkanDaftarAkun();
    document.getElementById("tambahUser").value = "";
    document.getElementById("tambahPass").value = "";
}

function tampilkanDaftarAkun() {
    const wadah = document.getElementById("tampilanDaftarAkun");
    wadah.innerHTML = "<h4 style='color:#ffd700; margin:10px 0;'>Daftar Akun:</h4>";
    daftarAkun.forEach((akun, idx) => {
        const status = akun.kadaluarsa === 0 ? "Selamanya" : new Date(akun.kadaluarsa).toLocaleDateString('id-ID');
        wadah.innerHTML += `
            <div class="daftar-akun">
                <p>👤 ${akun.username} | 🗓️ ${status}</p>
                <button class="btn-hapus" onclick="hapusAkun(${idx})">Hapus</button>
            </div>
        `;
    });
}

function hapusAkun(idx) {
    if (confirm("Yakin hapus akun ini?")) { daftarAkun.splice(idx, 1); simpanData(); tampilkanDaftarAkun(); }
}

function tambahItem() {
    const jenis = document.getElementById("jenisPeti").value;
    const nama = document.getElementById("namaItem").value.trim();
    const gambar = document.getElementById("gambarItem").value.trim();
    const peluang = parseFloat(document.getElementById("peluangItem").value);
    if (!nama || !gambar || isNaN(peluang) || peluang <= 0) return alert("⚠️ Isi semua data dengan benar!");
    chestData[jenis].push({ nama, gambar, peluang });
    simpanData();
    tampilkanDaftarItemAdmin();
    document.getElementById("namaItem").value = "";
    document.getElementById("gambarItem").value = "";
    document.getElementById("peluangItem").value = "";
}

function tampilkanDaftarItemAdmin() {
    const wadah = document.getElementById("daftarItemAdmin");
    wadah.innerHTML = "<h4 style='color:#ffd700; margin:10px 0;'>Daftar Item:</h4>";
    for (const jenis in chestData) {
        wadah.innerHTML += `<p style="color:#c0d8ff; margin-top:8px; font-weight:bold;">${jenis.toUpperCase()}</p>`;
        chestData[jenis].forEach((item, idx) => {
            wadah.innerHTML += `
                <div class="daftar-akun">
                    <p>${item.nama} | ${item.peluang}%</p>
                    <button class="btn-hapus" onclick="hapusItem('${jenis}', ${idx})">Hapus</button>
                </div>
            `;
        });
    }
}

function hapusItem(jenis, idx) {
    if (confirm("Yakin hapus item ini?")) { chestData[jenis].splice(idx, 1); simpanData(); tampilkanDaftarItemAdmin(); tampilkanDaftarItem(); }
}

function gantiLagu() {
    const link = document.getElementById("linkLagu").value.trim();
    if (!link) return alert("⚠️ Masukkan link lagu!");
    musik.src = link; musik.load(); musik.play().catch(e => {});
    alert("✅ Lagu berhasil diganti!");
}

function gantiLatar() {
    const link = document.getElementById("linkLatar").value.trim();
    if (!link) return alert("⚠️ Masukkan link gambar!");
    document.body.style.backgroundImage = `url('${link}')`;
    alert("✅ Latar belakang berhasil diganti!");
}
</script>
