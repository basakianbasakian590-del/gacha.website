<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Growtopia Pro V7 Ultimate</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .panel { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <!-- START SCREEN (WAJIB BUAT LAGU) -->
    <div id="start-screen">
        <button class="btn" onclick="startApp()" style="width: 200px;">KLIK UNTUK MASUK</button>
    </div>

    <div id="dev-tag" style="text-align: center; color: #555; margin-bottom: 10px;">Developer : @Andra</div>

    <div class="panel">
        <h3>Playlist Lagu</h3>
        <select id="song-select" style="width:100%; padding:10px; background:#222; color:#fff;" onchange="playSelected()">
            <option value="https://files.catbox.moe/sephia.mp3">Sephia - SO7</option>
            <option value="https://files.catbox.moe/dan.mp3">Dan - SO7</option>
            <option value="https://files.catbox.moe/separuhaku.mp3">Separuh Aku - Judika</option>
            <option value="https://files.catbox.moe/maafkan.mp3">Maafkan - D'Bagindas</option>
            <option value="https://files.catbox.moe/cupid.mp3">Cupid</option>
            <option value="https://files.catbox.moe/cantbefriends.mp3">We Can't Be Friends</option>
            <option value="https://files.catbox.moe/birds.mp3">Birds of Feather</option>
            <option value="https://files.catbox.moe/cry.mp3">Cry Before Sex</option>
        </select>
        <audio id="music" loop></audio>
    </div>

    <div id="login-box" class="panel">
        <h3>Login</h3>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="login()">LOGIN</button>
    </div>

    <div id="main-panel" class="panel" style="display:none;">
        <h2 id="welcome"></h2>
        <p>Saldo: $<span id="bal">0</span> USD</p>
        
        <h3>Gacha Simulation</h3>
        <img id="gacha-img" src="https://i.ibb.co/C0W2h2Z/Item-3374.png" style="width:100px; height:100px; border:1px solid #555;">
        <button class="btn" onclick="roll()">BUKA CHEST</button>

        <h3>Ganti Password</h3>
        <input type="password" id="new-p" placeholder="Password Baru">
        <button class="btn" onclick="changePass()">UBAH PASS</button>

        <div id="admin-tools" style="display:none; margin-top:20px; border-top:1px solid #444;">
            <h3>Admin Tools (Daftar Akun)</h3>
            <div id="user-list"></div>
        </div>
    </div>

<script>
    let users = JSON.parse(localStorage.getItem('users')) || { 
        'admin': { pass: 'admin123', bal: 1000, role: 'admin', passCount: 0 },
        'member': { pass: '12345', bal: 50, role: 'member', passCount: 0 }
    };
    let cur = '';

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        let m = document.getElementById('music');
        m.play();
    }

    function playSelected() {
        let m = document.getElementById('music');
        m.src = document.getElementById('song-select').value;
        m.play();
    }

    function login() {
        let u = document.getElementById('u').value;
        let p = document.getElementById('p').value;
        if(users[u] && users[u].pass == p) {
            cur = u;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            document.getElementById('welcome').innerText = "Halo " + u;
            document.getElementById('bal').innerText = users[u].bal;
            if(users[u].role == 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                renderAdmin();
            }
        } else alert('Login gagal!');
    }

    function changePass() {
        if(users[cur].passCount < 2) {
            users[cur].pass = document.getElementById('new-p').value;
            users[cur].passCount++;
            localStorage.setItem('users', JSON.stringify(users));
            alert('Password berhasil diganti!');
        } else alert('Limit ganti password (2x/minggu) habis!');
    }

    function renderAdmin() {
        let list = '';
        for(let u in users) {
            list += `<p style="border-bottom:1px solid #333;"><b>${u}</b> | Pass: <code>${users[u].pass}</code> | Saldo: $${users[u].bal}</p>`;
        }
        document.getElementById('user-list').innerHTML = list;
    }

    function roll() {
        let img = document.getElementById('gacha-img');
        // Proxy otomatis via weserv agar tidak tanda tanya
        img.src = "https://images.weserv.nl/?url=https://i.ibb.co/hK8bHhX/Item-3802.png";
        img.onerror = () => { img.src = 'https://i.ibb.co/C0W2h2Z/Item-3374.png'; };
    }
</script>
</body>
</html>
