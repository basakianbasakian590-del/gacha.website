<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growtopia Web Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background: #0f0c20;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Animasi ala Growtopia (Poin 5) */
        .bg-animation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a0033 0%, #001a33 100%);
            z-index: -2;
        }
        .particles {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(circle, #00ffcc 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 10s linear infinite;
            opacity: 0.3;
            z-index: -1;
        }
        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Jam Tiga Zona Waktu (Poin 4 & 7) */
        .jam-container {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #00ffcc;
            font-size: 0.9rem;
            text-align: center;
        }

        .panel-box {
            background: rgba(20, 20, 40, 0.9);
            border: 4px solid #e6a100;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 20px rgba(230, 161, 0, 0.5);
            text-align: center;
        }

        h2 { color: #e6a100; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        input, button {
            width: 100%; padding: 10px; margin: 10px 0;
            border-radius: 5px; border: none; font-weight: bold;
        }
        input { background: #fff; color: #000; }
        button { background: #e6a100; color: #fff; cursor: pointer; text-shadow: 1px 1px #000;}
        button:hover { background: #ffb700; }

        .hidden { display: none !important; }

        /* Menu Utama Dashboard */
        .dashboard { width: 90%; max-width: 800px; }
        .grid-menu { display: flex; gap: 20px; margin-top: 20px; }
        .card { 
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; 
            border: 2px solid #e6a100; flex: 1;
        }

        /* Gacha Section */
        .item-display { margin: 20px 0; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .item-img { width: 80px; height: 80px; image-rendering: pixelated; }

        /* Admin Panel (Poin 6) */
        .admin-section { border-color: #ff3333 !important; }
        .admin-section h3 { color: #ff3333; }
        .user-list { text-align: left; background: #000; padding: 10px; border-radius: 5px; max-height: 100px; overflow-y: auto; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="bg-animation"><div class="particles"></div></div>

    <!-- Info Jam (WIB, WITA, WIT) -->
    <div class="jam-container">
        <div id="hari-tanggal" style="width: 100%; color: #e6a100; margin-bottom: 5px; font-weight: bold;"></div>
        <div><span style="color:#00ffcc">WIB</span><br><span id="wib">00:00:00</span></div>
        <div><span style="color:#00ffcc">WITA</span><br><span id="wita">00:00:00</span></div>
        <div><span style="color:#00ffcc">WIT</span><br><span id="wit">00:00:00</span></div>
    </div>

    <!-- YouTube Audio Player (Hidden berkat Youtube API) -->
    <div id="player" style="position:absolute; top:-9999px; left:-9999px;"></div>

    <!-- 1. PANEL LOGIN -->
    <div id="login-panel" class="panel-box">
        <h2>GT PANEL LOGIN</h2>
        <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">Klik tombol di bawah terlebih dahulu untuk mengaktifkan musik.</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="prosesLogin()">LOGIN</button>
        <p id="login-error" style="color: red; margin-top: 10px; font-size: 0.8rem;"></p>
    </div>

    <!-- DASHBOARD UTAMA (Setelah Login) -->
    <div id="main-dashboard" class="dashboard hidden">
        <div class="panel-box" style="width: 100%;">
            <h2>SELAMAT DATANG DI GROWTOPIA PANEL</h2>
            <button onclick="logout()" style="width: auto; padding: 5px 15px; float: right; background: #ff3333;">Logout</button>
            
            <div class="grid-menu">
                <!-- Fitur Gacha/Crate -->
                <div class="card">
                    <h3>Gacha Crate</h3>
                    <div class="item-display" id="gacha-result">
                        <p>Silahkan Gacha!</p>
                    </div>
                    <button onclick="gachaItem()">Buka Crate (Gacha)</button>
                </div>

                <!-- 6. MENU ADMIN (Hanya muncul jika yang login adalah akun admin) -->
                <div id="admin-panel" class="card admin-section hidden">
                    <h3>ADMIN CONTROL</h3>
                    <p style="font-size: 0.8rem;">Buat Akun Member Baru:</p>
                    <input type="text" id="new-user" placeholder="Username Baru" style="padding: 5px;">
                    <input type="password" id="new-pass" placeholder="Password Baru" style="padding: 5px;">
                    <button onclick="tambahUser()" style="background: #ff3333; padding: 5px;">Buat Akun</button>
                    
                    <div class="user-list" id="daftar-user">
                        <!-- Daftar user terdaftar muncul di sini -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // DATA ITEM & CHANCE (Poin 3 - Bisa lu ubah sesuka hati di sini)
        // Pastikan total "chance" jika dijumlahkan bernilai 100
        const DATA_ITEM = [
            { nama: "World Lock", gambar: "https://images.vdownload.im/g/growtopia/items/world_lock.png", chance: 60 },
            { nama: "Diamond Lock", gambar: "https://images.vdownload.im/g/growtopia/items/diamond_lock.png", chance: 30 },
            { nama: "Blue Anemone Hair", gambar: "https://images.vdownload.im/g/growtopia/items/blue_anemone_hair.png", chance: 8 },
            { nama: "Devil Wings", gambar: "https://images.vdownload.im/g/growtopia/items/devil_wings.png", chance: 2 }
        ];

        // Database Akun bawaan (Hanya Admin yang terdaftar di awal)
        let databaseUser = {
            "admin": { pass: "admin123", role: "admin" }
        };

        let currentUser = null;
        let ytPlayer;

        // Integrasi Musik YouTube (Poin 2)
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'gQ59f_68sv4', // ID dari link youtube lu
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'gQ59f_68sv4' },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) {
            // Browser memblokir autoplay sebelum klik, lagu akan otomatis jalan begitu user interaksi dengan halaman web
            document.body.addEventListener('click', () => {
                ytPlayer.playVideo();
            }, { once: true });
        }

        // Live Clock WIB, WITA, WIT (Poin 4 & 7)
        function updateJam() {
            const sekarang = new Date();
            
            // Opsi untuk Tanggal dan Hari Indonesia
            const opsiHari = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
            document.getElementById('hari-tanggal').innerText = sekarang.toLocaleDateString('id-ID', opsiHari);

            // Format Jam asli berdasarkan Zona Waktu
            document.getElementById('wib').innerText = sekarang.toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta' });
            document.getElementById('wita').innerText = toggleTimezone(sekarang, 1);
            document.getElementById('wit').innerText = toggleTimezone(sekarang, 2);
        }
        
        function toggleTimezone(date, offsetHours) {
            let targetTime = new Date(date.getTime() + (offsetHours * 60 * 60 * 1000));
            return targetTime.toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta' });
        }
        setInterval(updateJam, 1000);
        updateJam();

        // Sistem Login (Poin 1 & 6)
        function prosesLogin() {
            const userInput = document.getElementById('username').value;
            const passInput = document.getElementById('password').value;
            const errorMengecek = document.getElementById('login-error');

            if (databaseUser[userInput] && databaseUser[userInput].pass === passInput) {
                currentUser = userInput;
                errorMengecek.innerText = "";
                
                // Pindah Tampilan
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');

                // Cek Role Admin
                if (databaseUser[userInput].role === "admin") {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    updateDaftarUser();
                } else {
                    document.getElementById('admin-panel').classList.add('hidden');
                }
            } else {
                errorMengecek.innerText = "Username atau Password Salah / Belum Dibuat Admin!";
            }
        }

        function logout() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('login-panel').classList.remove('hidden');
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            currentUser = null;
        }

        // Fitur Tambah Akun oleh Admin (Poin 6)
        function tambahUser() {
            const userBaru = document.getElementById('new-user').value.trim();
            const passBaru = document.getElementById('new-pass').value.trim();

            if (userBaru === "" || passBaru === "") {
                alert("Isi username dan password!");
                return;
            }

            if (databaseUser[userBaru]) {
                alert("User sudah terdaftar!");
                return;
            }

            databaseUser[userBaru] = { pass: passBaru, role: "member" };
            alert(`Akun untuk ${userBaru} berhasil dibuat!`);
            document.getElementById('new-user').value = "";
            document.getElementById('new-pass').value = "";
            updateDaftarUser();
        }

        function updateDaftarUser() {
            const listDiv = document.getElementById('daftar-user');
            listDiv.innerHTML = "<strong>Daftar Akun:</strong><br>";
            for (let user in databaseUser) {
                listDiv.innerHTML += `- ${user} (${databaseUser[user].role})<br>`;
            }
        }

        // Fitur Gacha Simple Sesuai Persentase (Poin 3)
        function gachaItem() {
            let rand = Math.random() * 100;
            let akumulasiChance = 0;
            let itemDidapat = DATA_ITEM[0];

            for (let item of DATA_ITEM) {
                akumulasiChance += item.chance;
                if (rand <= akumulasiChance) {
                    itemDidapat = item;
                    break;
                }
            }

            // Tampilkan Hasil
            const display = document.getElementById('gacha-result');
            display.innerHTML = `
                <img class="item-img" src="${itemDidapat.gambar}" alt="${itemDidapat.nama}" onerror="this.src='https://placehold.co/80?text=Item'">
                <p style="font-weight:bold; color:#e6a100; margin-top:5px;">${itemDidapat.nama}</p>
                <p style="font-size:0.7rem; color:#aaa;">Chance: ${itemDidapat.chance}%</p>
            `;
        }
    </script>
</body>
</html>
