openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AndraDev Growtopia Gacha API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: balance
    description: Balance operations
  - name: chests
    description: Gacha chests
  - name: items
    description: Gacha items
  - name: gacha
    description: Gacha pulls
  - name: settings
    description: Site settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials or blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change current user password (max 3 times)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error or limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/balance:
    post:
      operationId: adjustBalance
      tags: [balance]
      summary: Add or set balance for user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjust"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /balance/transfer:
    post:
      operationId: transferBalance
      tags: [balance]
      summary: Transfer balance to another user by username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "200":
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResult"

  /balance/renew:
    post:
      operationId: renewAccount
      tags: [balance]
      summary: Renew account expiry using balance (member only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewInput"
      responses:
        "200":
          description: Renewal successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /chests:
    get:
      operationId: listChests
      tags: [chests]
      summary: List all gacha chests
      responses:
        "200":
          description: List of chests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chest"

    post:
      operationId: createChest
      tags: [chests]
      summary: Create a chest (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChestInput"
      responses:
        "201":
          description: Chest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chest"

  /chests/{id}:
    patch:
      operationId: updateChest
      tags: [chests]
      summary: Update chest (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChestUpdate"
      responses:
        "200":
          description: Chest updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chest"

    delete:
      operationId: deleteChest
      tags: [chests]
      summary: Delete chest (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chest deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all gacha items (optionally filter by chest_id)
      parameters:
        - name: chest_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GachaItem"

    post:
      operationId: createItem
      tags: [items]
      summary: Create a gacha item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GachaItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GachaItem"

  /items/{id}:
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update gacha item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GachaItemUpdate"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GachaItem"

    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete gacha item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /gacha/pull:
    post:
      operationId: pullGacha
      tags: [gacha]
      summary: Pull gacha from a chest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GachaPullInput"
      responses:
        "200":
          description: Gacha result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GachaPullResult"

  /gacha/history:
    get:
      operationId: listGachaHistory
      tags: [gacha]
      summary: Get gacha pull history for current user
      responses:
        "200":
          description: Gacha history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GachaHistory"

  /gacha/stats:
    get:
      operationId: getGachaStats
      tags: [gacha]
      summary: Get gacha statistics (admin dashboard)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GachaStats"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        attemptsLeft:
          type: ["integer", "null"]
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, member]
        balance:
          type: integer
        isBlocked:
          type: boolean
        failedAttempts:
          type: integer
        passwordChanges:
          type: integer
        passwordChangeLocked:
          type: boolean
        expiresAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - username
        - role
        - balance
        - isBlocked
        - failedAttempts
        - passwordChanges
        - passwordChangeLocked
        - createdAt

    UserInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, member]
        balance:
          type: integer
        expiresAt:
          type: ["string", "null"]
      required:
        - username
        - password
        - role

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, member]
        balance:
          type: integer
        isBlocked:
          type: boolean
        expiresAt:
          type: ["string", "null"]

    BalanceAdjust:
      type: object
      properties:
        amount:
          type: integer
        mode:
          type: string
          enum: [add, set]
      required:
        - amount
        - mode

    TransferInput:
      type: object
      properties:
        toUsername:
          type: string
        amount:
          type: integer
      required:
        - toUsername
        - amount

    TransferResult:
      type: object
      properties:
        success:
          type: boolean
        fromBalance:
          type: integer
        toUsername:
          type: string
        amount:
          type: integer
      required:
        - success
        - fromBalance
        - toUsername
        - amount

    RenewInput:
      type: object
      properties:
        days:
          type: integer
      required:
        - days

    Chest:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [basic, rare, mythic]
        imageUrl:
          type: ["string", "null"]
        costPerPull:
          type: integer
        isActive:
          type: boolean
        itemCount:
          type: integer
      required:
        - id
        - name
        - type
        - costPerPull
        - isActive
        - itemCount

    ChestInput:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [basic, rare, mythic]
        imageUrl:
          type: string
        costPerPull:
          type: integer
        isActive:
          type: boolean
      required:
        - name
        - type
        - costPerPull

    ChestUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [basic, rare, mythic]
        imageUrl:
          type: string
        costPerPull:
          type: integer
        isActive:
          type: boolean

    GachaItem:
      type: object
      properties:
        id:
          type: integer
        chestId:
          type: integer
        name:
          type: string
        imageUrl:
          type: ["string", "null"]
        chance:
          type: number
        rarity:
          type: string
          enum: [common, rare, legendary]
      required:
        - id
        - chestId
        - name
        - chance
        - rarity

    GachaItemInput:
      type: object
      properties:
        chestId:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
        chance:
          type: number
        rarity:
          type: string
          enum: [common, rare, legendary]
      required:
        - chestId
        - name
        - chance
        - rarity

    GachaItemUpdate:
      type: object
      properties:
        name:
          type: string
        imageUrl:
          type: string
        chance:
          type: number
        rarity:
          type: string
          enum: [common, rare, legendary]

    GachaPullInput:
      type: object
      properties:
        chestId:
          type: integer
      required:
        - chestId

    GachaPullResult:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/GachaItem"
        chest:
          $ref: "#/components/schemas/Chest"
        remainingBalance:
          type: integer
      required:
        - item
        - chest
        - remainingBalance

    GachaHistory:
      type: object
      properties:
        id:
          type: integer
        itemName:
          type: string
        itemImageUrl:
          type: ["string", "null"]
        itemRarity:
          type: string
        chestName:
          type: string
        chestType:
          type: string
        pulledAt:
          type: string
      required:
        - id
        - itemName
        - chestName
        - chestType
        - itemRarity
        - pulledAt

    GachaStats:
      type: object
      properties:
        totalPulls:
          type: integer
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalBalanceCirculating:
          type: integer
        topItems:
          type: array
          items:
            type: object
            properties:
              itemName:
                type: string
              pullCount:
                type: integer
            required:
              - itemName
              - pullCount
      required:
        - totalPulls
        - totalUsers
        - activeUsers
        - totalBalanceCirculating
        - topItems

    SiteSettings:
      type: object
      properties:
        siteName:
          type: string
        renewalCostPerDay:
          type: integer
        maintenanceMode:
          type: boolean
        primaryColor:
          type: string
        bgType:
          type: string
          enum: [particles, gradient, image, color]
        bgValue:
          type: string
        themeMode:
          type: string
          enum: [dark, light]
        customLabels:
          type: string
        musicUrl:
          type: string
      required:
        - siteName
        - renewalCostPerDay
        - maintenanceMode
        - primaryColor
        - bgType
        - bgValue
        - themeMode
        - customLabels
        - musicUrl

    SiteSettingsUpdate:
      type: object
      properties:
        siteName:
          type: string
        renewalCostPerDay:
          type: integer
        maintenanceMode:
          type: boolean
        primaryColor:
          type: string
        bgType:
          type: string
          enum: [particles, gradient, image, color]
        bgValue:
          type: string
        themeMode:
          type: string
          enum: [dark, light]
        customLabels:
          type: string
        musicUrl:
          type: string
